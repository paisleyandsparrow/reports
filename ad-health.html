const DATES   = ["2026-05-01", "2026-04-30", "2026-04-29", "2026-04-28", "2026-04-27", "2026-04-26", "2026-04-25", "2026-04-24", "2026-04-23", "2026-04-22", "2026-04-21", "2026-04-20", "2026-04-19", "2026-04-18", "2026-04-17", "2026-04-16", "2026-04-15", "2026-04-14", "2026-04-13", "2026-04-12", "2026-04-11", "2026-04-10", "2026-04-09", "2026-04-08", "2026-04-07", "2026-04-06", "2026-04-05", "2026-04-04", "2026-04-03", "2026-04-02"];

let activeDate = DATES[0] || null;

function fmt(n, prefix='$') {
  if (n == null) return '—';
  return prefix + n.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}
function fmtDate(s) {
  if (!s) return s;
  const [y,m,d] = s.split('-');
  return `${parseInt(m)}/${parseInt(d)}/${y.slice(2)}`;
}

function healthScore(placements) {
  const exc = placements.filter(p => p.status === 'exclude').length;
  const wrn = placements.filter(p => p.status === 'warn').length;
  return Math.max(0, 100 - exc * 25 - wrn * 10);
}

function scoreColor(s) {
  return s >= 80 ? '#16a34a' : s >= 55 ? '#d97706' : '#dc2626';
}

function ring(placements) {
  const s = healthScore(placements);
  const color = scoreColor(s);
  const r = 20, circ = 2 * Math.PI * r;
  const label = s >= 80 ? 'Healthy' : s >= 55 ? 'Needs work' : 'Act now';
  return `<div class="ring-wrap">
    <svg width="52" height="52" viewBox="0 0 52 52">
      <circle cx="26" cy="26" r="${r}" fill="none" stroke="#e4e7ec" stroke-width="4.5"/>
      <circle cx="26" cy="26" r="${r}" fill="none" stroke="${color}" stroke-width="4.5"
        stroke-dasharray="${(s/100)*circ} ${circ}" stroke-linecap="round" transform="rotate(-90 26 26)"/>
      <text x="26" y="31" text-anchor="middle" font-size="13" font-weight="800" fill="${color}">${s}</text>
    </svg>
    <span class="ring-label" style="color:${color}">${label}</span>
  </div>`;
}

function renderDateNav() {
  const idx = DATES.indexOf(activeDate);
  document.getElementById('date-label').textContent = fmtDate(activeDate);
  document.getElementById('btn-prev').disabled = idx >= DATES.length - 1;
  document.getElementById('btn-next').disabled = idx <= 0;
}

function stepDate(dir) {
  const idx = DATES.indexOf(activeDate);
  const next = idx - dir;
  if (next >= 0 && next < DATES.length) setDate(DATES[next]);
}

function renderKpis(adSets) {
  const spend  = adSets.reduce((s,a) => s + a.spend, 0);
  const earn   = adSets.reduce((s,a) => s + a.earnings, 0);
  const clicks = adSets.reduce((s,a) => s + a.clicks, 0);
  const impr   = adSets.reduce((s,a) => s + a.impressions, 0);
  const roi    = spend > 0 ? ((earn - spend) / spend * 100) : null;
  const ctr    = impr  > 0 ? (clicks / impr * 100) : 0;
  const excl   = adSets.reduce((s,a) => s + a.placements.filter(p => p.status==='exclude').length, 0);
  const warn   = adSets.reduce((s,a) => s + a.placements.filter(p => p.status==='warn').length, 0);
  const roiColor = roi == null ? '#94a3b8' : roi >= 0 ? '#16a34a' : '#dc2626';
  const tiles = [
    {label:'Total Spend',    value: fmt(spend),    color:'#0f172a'},
    {label:'Total Earnings', value: earn > 0 ? fmt(earn) : '—', color:'#16a34a'},
    {label:'Overall ROI',    value: roi != null ? `${roi>=0?'+':''}${roi.toFixed(1)}%` : '—', color: roiColor},
    {label:'Total Clicks',   value: clicks.toLocaleString(), color:'#0f172a'},
    {label:'Avg CTR',        value: ctr.toFixed(2)+'%', color:'#0f172a'},
    {label:'Flags',          value: `${excl} exclude · ${warn} warn`, color: excl>0?'#dc2626':warn>0?'#d97706':'#16a34a'},
  ];
  document.getElementById('kpis').innerHTML = tiles.map(t =>
    `<div class="kpi"><div class="kpi-label">${t.label}</div><div class="kpi-value" style="color:${t.color}">${t.value}</div></div>`
  ).join('');
}

function renderCards(adSets) {
  const wrap = document.getElementById('cards');
  if (!adSets.length) {
    wrap.innerHTML = '<div class="no-data">No ad spend data for this date.</div>';
    return;
  }
  wrap.innerHTML = adSets.map(ad => {
    const hasExcl = ad.placements.some(p => p.status==='exclude');
    const hasWarn = ad.placements.some(p => p.status==='warn');
    const badge = hasExcl
      ? '<span class="badge badge-exclude">🚨 Action needed</span>'
      : hasWarn ? '<span class="badge badge-warn">⚠️ Review</span>'
      : '<span class="badge badge-good">✅ All good</span>';
    const tidLine = ad.tracking_id
      ? `<div class="card-tid">ID: ${ad.tracking_id}</div>`
      : `<div class="card-tid warn">⚠️ No tracking ID — earnings not attributed</div>`;
    const kpis = [
      {label:'Spend',    value: fmt(ad.spend),    color:'#0f172a'},
      {label:'Earnings', value: ad.earnings > 0 ? fmt(ad.earnings) : '—', color:'#16a34a'},
      {label:'ROI',      value: ad.roi != null ? `${ad.roi>=0?'+':''}${ad.roi.toFixed(1)}%` : '—',
                          color: ad.roi==null?'#9ca3af':ad.roi>=0?'#16a34a':'#dc2626'},
      {label:'Clicks',   value: ad.clicks.toLocaleString(), color:'#374151'},
      {label:'Avg CPC',  value: fmt(ad.avg_cpc),  color:'#374151'},
      {label:'CTR',      value: ad.ctr.toFixed(2)+'%', color:'#374151'},
    ];
    const kpiHtml = kpis.map(k =>
      `<div><div class="kpi-mini-label">${k.label}</div><div class="kpi-mini-value" style="color:${k.color}">${k.value}</div></div>`
    ).join('') + ad.flags.map(f => `<div style="align-self:flex-end"><span class="flag-pill">📈 ${f}</span></div>`).join('');

    const statusClass = {good:'status-good', warn:'status-warn', exclude:'status-exclude'};
    const rows = ad.placements.map(p =>
      `<tr>
        <td>${p.label}</td>
        <td>${fmt(p.spend)}</td>
        <td>${fmt(p.cpc)}</td>
        <td>${p.ctr.toFixed(2)}%</td>
        <td><span class="status-pill ${statusClass[p.status]}">${p.flag || p.status.charAt(0).toUpperCase()+p.status.slice(1)}</span></td>
      </tr>`
    ).join('');

    const rec = ad.recommendation
      ? `<div class="rec-banner"><strong>Recommendation:</strong> ${ad.recommendation}</div>` : '';

    return `<div class="card">
      <div class="card-header">
        <div class="card-top">
          ${ring(ad.placements)}
          <div class="card-meta">
            <div class="card-tag">Ad Set ${badge}</div>
            <div class="card-name">${ad.clean_name}</div>
            ${tidLine}
          </div>
        </div>
        <div class="kpi-row">${kpiHtml}</div>
      </div>
      <div class="placement-heading"><span>Placement Health</span></div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th style="text-align:left">Placement</th><th>Spend</th><th>CPC</th><th>CTR</th><th>Status</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      ${rec}
    </div>`;
  }).join('');
}

function setDate(d) {
  activeDate = d;
  renderDateNav();
  const adSets = PAYLOAD[d] || [];
  renderKpis(adSets);
  renderCards(adSets);
}

if (activeDate) setDate(activeDate);
else document.getElementById('cards').innerHTML = '<div class="no-data">No placement data stored yet. Run the scheduler or backfill script first.</div>';
</script>
