const TAG          = META.tracking_tag;

const PAGE_SIZE = 200;
let filtered    = [];
let shown       = 0;
let sortBy      = "rate";

// Filters state
let state = {
  search:      "",
  dateFrom:    "",
  dateTo:      "",
  minRate:     META.min_rate,
  category:    "",
  sellingOnly: false,
};

function setSort(s) {
  sortBy = s;
  document.querySelectorAll(".sort-pill").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  applyFilters();
}

function sortCampaigns(arr) {
  const copy = [...arr];
  if (sortBy === "rate")   return copy.sort((a,b) => b.rate - a.rate);
  if (sortBy === "newest") return copy.sort((a,b) => b.added.localeCompare(a.added));
  if (sortBy === "oldest") return copy.sort((a,b) => a.added.localeCompare(b.added));
  if (sortBy === "brand")  return copy.sort((a,b) => a.brand.localeCompare(b.brand));
  return copy;
}

// Populate meta chip
document.getElementById("meta-chip").textContent =
  `${META.total.toLocaleString()} campaigns · ${META.min_rate}%+ · updated ${META.generated}`;

// Set default date range to last 7 days
function toDateStr(d) { return d.toISOString().split("T")[0]; }
const today = toDateStr(new Date());
const sevenAgo = toDateStr(new Date(Date.now() - 7*86400000));
document.getElementById("date-from").value = sevenAgo;
document.getElementById("date-to").value   = today;
state.dateFrom = sevenAgo;
state.dateTo   = today;
setActivePreset("7");

// Wire up inputs
document.getElementById("search").addEventListener("keydown", e => {
  if (e.key === "Enter") { state.search = e.target.value.trim(); applyFilters(); }
  if (e.key === "Escape") { clearSearch(); }
});
document.getElementById("search").addEventListener("input", e => {
  document.getElementById("clear-search").style.display = e.target.value ? "block" : "none";
});
document.getElementById("date-from").addEventListener("change", e => {
  state.dateFrom = e.target.value; setActivePreset("custom"); applyFilters();
});
document.getElementById("date-to").addEventListener("change", e => {
  state.dateTo = e.target.value; setActivePreset("custom"); applyFilters();
});
document.getElementById("min-rate").addEventListener("change", e => {
  state.minRate = parseFloat(e.target.value) || 0; applyFilters();
});
document.getElementById("category-filter").addEventListener("change", e => {
  state.category = e.target.value; applyFilters();
});

function toggleSelling() {
  state.sellingOnly = !state.sellingOnly;
  const btn = document.getElementById("selling-btn");
  btn.classList.toggle("active", state.sellingOnly);
  applyFilters();
}

function clearSearch() {
  state.search = "";
  document.getElementById("search").value = "";
  document.getElementById("clear-search").style.display = "none";
  applyFilters();
}

function setPreset(p) {
  const df = document.getElementById("date-from");
  const dt = document.getElementById("date-to");
  if (p === "all")  { state.dateFrom = ""; state.dateTo = ""; df.value = ""; dt.value = ""; }
  if (p === "7")    { state.dateFrom = toDateStr(new Date(Date.now()-7*86400000));  state.dateTo = today; df.value = state.dateFrom; dt.value = state.dateTo; }
  if (p === "30")   { state.dateFrom = toDateStr(new Date(Date.now()-30*86400000)); state.dateTo = today; df.value = state.dateFrom; dt.value = state.dateTo; }
  setActivePreset(p);
  applyFilters();
}

function setActivePreset(p) {
  document.querySelectorAll(".preset-btn").forEach(b => b.classList.remove("active"));
  const map = {"all": 0, "7": 1, "30": 2};
  const btns = document.querySelectorAll(".preset-btn");
  if (p in map) btns[map[p]].classList.add("active");
  document.getElementById("preset-custom").style.display = p === "custom" ? "inline-block" : "none";
  if (p === "custom") document.getElementById("preset-custom").classList.add("active");
}

function matchesSearch(c, term) {
  if (!term) return true;
  const low = term.toLowerCase();
  return (c.brand + " " + c.name).toLowerCase().includes(low);
}

function applyFilters() {
  const searching = Boolean(state.search);
  filtered = sortCampaigns(CAMPAIGNS.filter(c => {
    if (c.rate < state.minRate) return false;
    if (!searching) {
      if (state.dateFrom && c.added < state.dateFrom) return false;
      if (state.dateTo   && c.added > state.dateTo)   return false;
    }
    if (state.category && !c.cats.includes(state.category)) return false;
    if (!matchesSearch(c, state.search)) return false;
    if (state.sellingOnly && !c.already_selling) return false;
    return true;
  }));
  shown = 0;
  document.getElementById("grid").innerHTML = "";
  renderBatch();
  updateCount();
}

function updateCount() {
  const badge = document.getElementById("count-badge");
  const total = CAMPAIGNS.length;
  if (filtered.length < total) {
    badge.innerHTML = `<strong>${filtered.length.toLocaleString()}</strong> of ${total.toLocaleString()} campaigns`;
  } else {
    badge.innerHTML = `<strong>${total.toLocaleString()}</strong> campaigns`;
  }
}

function rateColor(rate) {
  if (rate >= 25) return {bg:"#fff7ed", text:"#c2410c"};
  if (rate >= 12) return {bg:"#f0fdf4", text:"#16a34a"};
  return {bg:"#f8fafc", text:"#64748b"};
}

function cardHtml(c) {
  const rc = rateColor(c.rate);
  const imgHtml = c.img
    ? `<img class="card-img" src="${c.img}" alt="${c.brand}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : "";
  const placeholder = `<div class="card-img-placeholder" style="${c.img ? "display:none" : ""}">${c.brand[0]?.toUpperCase() || "?"}</div>`;
  const catPills = c.cats.slice(0,2).map(cat => {
    const col = CAT_COLORS[cat] || {bg:"#f1f5f9",text:"#475569"};
    const short = cat.split(" ")[0];
    return `<span class="cat-pill" style="background:${col.bg};color:${col.text}">${short}</span>`;
  }).join("");
  const asinLinks = c.asins.slice(0,2).map(a =>
    `<a class="asin-link" href="https://www.amazon.com/dp/${a}?tag=${TAG}" target="_blank" rel="noopener">${a}</a>`
  ).join("");
  const ccLink = `<a class="cc-link" href="https://affiliate-program.amazon.com/p/connect/requests?campaignId=${c.id}" target="_blank" rel="noopener">CC →</a>`;
  const acceptedBadge = c.accepted ? `<span class="accepted-badge">✓ Accepted</span>` : "";

  return `<div class="card" style="position:relative">
    ${c.already_selling ? `<span class="selling-badge">★ Selling</span>` : ""}
    ${imgHtml}${placeholder}
    <div class="card-header">
      <div class="brand">${c.brand}</div>
      <span class="rate-badge" style="background:${rc.bg};color:${rc.text}">${c.rate.toFixed(0)}%</span>
    </div>
    ${c.name ? `<div class="campaign-name">${c.name}</div>` : ""}
    ${catPills ? `<div class="cats">${catPills}</div>` : ""}
    <div class="card-footer">
      <div class="added-date">Added ${c.added}${acceptedBadge ? " · " + acceptedBadge : ""}</div>
      <div class="asins">${asinLinks}${ccLink}</div>
    </div>
  </div>`;
}

function renderBatch() {
  const batch = filtered.slice(shown, shown + PAGE_SIZE);
  if (batch.length === 0 && shown === 0) {
    document.getElementById("empty-state").style.display = "flex";
    document.getElementById("load-more-wrap").style.display = "none";
    return;
  }
  document.getElementById("empty-state").style.display = "none";
  const grid = document.getElementById("grid");
  grid.insertAdjacentHTML("beforeend", batch.map(cardHtml).join(""));
  shown += batch.length;
  document.getElementById("load-more-wrap").style.display =
    shown < filtered.length ? "flex" : "none";
  if (shown < filtered.length) {
    document.querySelector(".load-more-btn").textContent =
      `Load more (${(filtered.length - shown).toLocaleString()} remaining)`;
  }
}

function loadMore() { renderBatch(); }

// ── Already Earning panel ──────────────────────────────────────────────────
let earningPreset = "all";
let earningOpen   = true;

function toggleEarning() {
  earningOpen = !earningOpen;
  document.getElementById("earning-body").classList.toggle("collapsed", !earningOpen);
  const ch = document.getElementById("earning-chevron");
  ch.classList.toggle("open", earningOpen);
}

function setEarningPreset(p) {
  earningPreset = p;
  document.querySelectorAll(".earning-preset").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  renderEarning();
}

// Lazy-load product images via Amazon widget URL with fallback to brand initial
const imgCacheE = {};
function earningCardHtml(e) {
  const initial = (e.title[0] || "?").toUpperCase();
  const imgSrc  = e.img || "";
  const imgHtml = imgSrc
    ? `<img class="earning-img" src="${imgSrc}" alt="${e.title}" loading="lazy"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : "";
  const phStyle = imgSrc ? "display:none" : "";
  const asinLink = e.asin
    ? `<a href="https://www.amazon.com/dp/${e.asin}?tag=${TAG}" target="_blank" rel="noopener" class="earning-link">Amazon ↗</a>`
    : "";
  const ccLink = e.campaign_id
    ? `<a href="https://affiliate-program.amazon.com/p/connect/requests?campaignId=${e.campaign_id}" target="_blank" rel="noopener" class="earning-link">CC ↗</a>`
    : "";
  return `<div class="earning-card">
    ${imgHtml}
    <div class="earning-img-placeholder" style="${phStyle}">${initial}</div>
    <span class="earning-rate">${e.rate.toFixed(0)}%</span>
    <div class="earning-name">${e.title}</div>
    <div class="earning-income">$${e.income.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
    ${e.units ? `<div class="earning-units">${e.units.toLocaleString()} units</div>` : ""}
    ${(asinLink || ccLink) ? `<div class="earning-links">${asinLink}${ccLink}</div>` : ""}
  </div>`;
}

function renderEarning() {
  const items = EARNING_SETS[earningPreset] || [];
  const total = items.reduce((s, x) => s + x.income, 0);
  const label = earningPreset === "all" ? "all time" : `last ${earningPreset} days`;
  document.getElementById("earning-total-label").textContent =
    `$${total.toLocaleString("en-US",{minimumFractionDigits:0,maximumFractionDigits:0})} total · ${items.length} campaigns (${label})`;
  document.getElementById("earning-strip").innerHTML = items.map(earningCardHtml).join("");
}

renderEarning();

// Initial render
applyFilters();
</script>
