<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paisley & Sparrow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      min-height: 200px;
      font-family: Inter, -apple-system, sans-serif;
      background: #fbf7f3;
      color: #1a1410;
      padding: 24px 20px 20px;
    }

    .brand {
      font-family: Georgia, serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: #1a1410;
      margin-bottom: 4px;
    }
    .brand em { color: #ec4899; font-style: italic; }

    .tagline {
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #a89485;
      margin-bottom: 20px;
    }

    /* --- Auth section --- */
    #auth-section { display: flex; flex-direction: column; gap: 12px; }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: #1a1410;
      color: #fbf7f3;
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 0.87rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.01em;
      transition: background 0.15s;
    }
    .google-btn:hover { background: #2d2419; }
    .google-btn:disabled { background: #d4c5b3; cursor: not-allowed; }

    .google-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* --- Main section (logged in) --- */
    #main-section { display: none; flex-direction: column; gap: 14px; }

    .user-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.78rem;
      color: #a89485;
    }
    .user-email { font-weight: 500; color: #1a1410; }
    .sign-out-btn {
      background: none;
      border: none;
      color: #a89485;
      font-size: 0.72rem;
      cursor: pointer;
      font-family: inherit;
      text-decoration: underline;
      padding: 0;
    }
    .sign-out-btn:hover { color: #ec4899; }

    .status-box {
      background: #fff;
      border: 1px solid #f1ebe5;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 0.8rem;
      line-height: 1.55;
    }
    .status-label {
      font-size: 0.63rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #a89485;
      margin-bottom: 6px;
    }
    .status-value { color: #1a1410; font-weight: 500; }
    .status-warn { color: #b45309; }
    .status-ok { color: #065f46; }
    .status-none { color: #a89485; font-style: italic; }

    .capture-btn {
      width: 100%;
      background: #ec4899;
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 13px 18px;
      font-size: 0.87rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.01em;
      transition: background 0.15s;
    }
    .capture-btn:hover { background: #db2777; }
    .capture-btn:disabled { background: #d4c5b3; cursor: not-allowed; }

    .feedback {
      font-size: 0.75rem;
      text-align: center;
      font-weight: 500;
      min-height: 18px;
    }
    .feedback.success { color: #065f46; }
    .feedback.error { color: #9f1239; }

    .divider { height: 1px; background: #f1ebe5; }
  </style>
</head>
<body>

  <div class="brand">Paisley &amp; <em>Sparrow</em></div>
  <div class="tagline">Creator Connections</div>

  <!-- Not logged in -->
  <div id="auth-section">
    <p style="font-size:0.82rem;color:#a89485;line-height:1.5;margin-bottom:4px;">
      Sign in with the same Google account you use on the Paisley &amp; Sparrow portal.
    </p>
    <button class="google-btn" id="sign-in-btn">
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>
    <div class="feedback" id="auth-feedback"></div>
  </div>

  <!-- Logged in -->
  <div id="main-section">
    <div class="user-row">
      <span class="user-email" id="user-email-display"></span>
      <button class="sign-out-btn" id="sign-out-btn">Sign out</button>
    </div>

    <div class="divider"></div>

    <div class="status-box" id="session-status-box">
      <div class="status-label">Amazon session</div>
      <div class="status-value status-none" id="session-status-text">No session captured yet</div>
    </div>

    <button class="capture-btn" id="capture-btn">
      Capture Amazon Session
    </button>

    <div class="feedback" id="capture-feedback"></div>
  </div>

  <script src="supabase.js"></script>
  <script src="popup.js"></script>
</body>
</html>
